name: Format

on:
  pull_request:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift_format:
    name: swift-format
    runs-on: macOS-14
    steps:
      - uses: actions/checkout@v4

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install swift-format
        run: brew install swift-format

      - name: Check Format
        run: swift-format lint --configuration .swift-format --recursive .
  
  build:
    name: build
    runs-on: macOS-14
    needs: swift_format
    steps:
      - uses: actions/checkout@v4

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build (iOS 17.2 Simulator)
        run: xcodebuild -project dauphin.xcodeproj -scheme "dauphin" -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' clean build
