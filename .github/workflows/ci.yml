on:
  pull_request:
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - dev
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  swift_format:
    name: swift-format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install swift-format
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install swift-format

      - name: Check Format
        run: swift-format lint --configuration app/.swift-format --recursive .

      - name: Format summary
        if: always()
        run: |
          {
            echo "## swift-format"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  localization_check:
    name: localization-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Check localizations
        run: uv run scripts/check_localizations.py

      - name: Localization summary
        if: always()
        run: |
          {
            echo "## localization-check"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.spm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install xcbeautify
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install xcbeautify

      - name: Resolve compatible simulator destination
        run: |
          python3 scripts/select_simulator_destination.py \
            --project app/dauphin.xcodeproj \
            --scheme dauphin \
            --github-env "$GITHUB_ENV"

      - name: Build and run unit tests (iOS Simulator)
        run: |
          mkdir -p reports
          set -o pipefail
          xcodebuild \
            -project app/dauphin.xcodeproj \
            -scheme "dauphin" \
            -testPlan Models \
            -configuration Debug \
            -destination "id=$SIMULATOR_DESTINATION_ID" \
            -clonedSourcePackagesDirPath "${{ github.workspace }}/.spm" \
            -resultBundlePath TestResults.xcresult \
            test | xcbeautify --renderer github-actions --report junit --report-path reports/junit.xml

      - name: Publish test report
        if: success() && hashFiles('reports/junit.xml') != ''
        uses: mikepenz/action-junit-report@v5
        continue-on-error: true
        with:
          report_paths: reports/junit.xml
          check_name: junit
          include_passed: true

      - name: Upload xcresult artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-test-xcresult
          path: TestResults.xcresult
          if-no-files-found: warn

      - name: Test summary
        if: always()
        run: |
          {
            echo "## test"
            echo "- Status: ${{ job.status }}"
            echo "- Destination: $SIMULATOR_DESTINATION_NAME ($SIMULATOR_DESTINATION_OS)"
            echo "- Result bundle: TestResults.xcresult"
            echo "- JUnit report: reports/junit.xml"
          } >> "$GITHUB_STEP_SUMMARY"
