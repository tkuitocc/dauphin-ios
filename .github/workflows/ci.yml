on:
  pull_request:
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - dev
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift_format:
    name: swift-format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install swift-format
        run: brew install swift-format

      - name: Check Format
        run: swift-format lint --configuration app/.swift-format --recursive .

  localization_check:
    name: localization-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check localizations
        run: python3 scripts/check_localizations.py

  build_and_test:
    name: build-and-test
    runs-on: macos-latest
    needs: [swift_format, localization_check]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install iOS Simulator runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: DerivedData/Build
          key: deriveddata-${{ runner.os }}-${{ hashFiles('app/dauphin.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Show Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Build for testing (iOS Simulator)
        run: |
          xcodebuild \
            -project app/dauphin.xcodeproj \
            -scheme "dauphin" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build-for-testing

      - name: Run unit tests (iOS Simulator)
        run: |
          xcodebuild \
            -project app/dauphin.xcodeproj \
            -scheme "dauphin" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            -testPlan Models \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            test-without-building
