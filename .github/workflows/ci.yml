on:
  pull_request:
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - dev
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  swift_format:
    name: swift-format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install swift-format
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install swift-format

      - name: Check Format
        run: swift-format lint --configuration app/.swift-format --recursive .

      - name: Format summary
        if: always()
        run: |
          {
            echo "## swift-format"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  localization_check:
    name: localization-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Check localizations
        run: uv run scripts/check_localizations.py

      - name: Localization summary
        if: always()
        run: |
          {
            echo "## localization-check"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show Xcode
        run: |
          xcodebuild -version
          xcode-select -p

      - name: Cache SwiftPM packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.spm
          key: ${{ runner.os }}-xcode-16.2-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-16.2-spm-

      - name: Install xcbeautify
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install xcbeautify

      - name: Pre-boot iOS simulator
        run: |
          SIMULATOR_UDID="$(xcrun simctl list devices available -j | python3 -c "import json, sys; data=json.load(sys.stdin).get('devices', {}); preferred='com.apple.CoreSimulator.SimRuntime.iOS-18-2'; names=['iPhone 16 Pro','iPhone 16']; candidates=[]; [candidates.append((r,d.get('name'),d.get('udid'))) for r,devices in data.items() for d in devices if d.get('isAvailable') and d.get('name') in names and r.startswith('com.apple.CoreSimulator.SimRuntime.iOS-18-') and d.get('udid')]; candidates.sort(key=lambda x: (0 if x[0]==preferred else 1, names.index(x[1]), x[0]), reverse=False); print(candidates[0][2] if candidates else '');")"
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "Unable to find an available iPhone 16 Pro/iPhone 16 simulator on iOS 18.x"
            exit 1
          fi
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b

      - name: Build and run unit tests (iOS Simulator)
        run: |
          mkdir -p reports
          set -o pipefail
          xcodebuild \
            -project app/dauphin.xcodeproj \
            -scheme "dauphin" \
            -testPlan Models \
            -configuration Debug \
            -destination "id=$SIMULATOR_UDID" \
            -clonedSourcePackagesDirPath "${{ github.workspace }}/.spm" \
            -resultBundlePath TestResults.xcresult \
            test | xcbeautify --renderer github-actions --report junit --report-path reports/junit.xml

      - name: Publish test report
        if: success() && hashFiles('reports/junit.xml') != ''
        uses: mikepenz/action-junit-report@v5
        continue-on-error: true
        with:
          report_paths: reports/junit.xml
          check_name: junit
          include_passed: true

      - name: Upload xcresult artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-test-xcresult
          path: TestResults.xcresult

      - name: Test summary
        if: always()
        run: |
          {
            echo "## test"
            echo "- Status: ${{ job.status }}"
            echo "- Destination: iPhone 16 Pro/iPhone 16 (prefer iOS 18.2)"
            echo "- Simulator UDID: $SIMULATOR_UDID"
            echo "- Result bundle: TestResults.xcresult"
            echo "- JUnit report: reports/junit.xml"
          } >> "$GITHUB_STEP_SUMMARY"
