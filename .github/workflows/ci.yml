on:
  pull_request:
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - dev
    paths:
      - "app/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift_format:
    name: swift-format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Format
        run: |
          SWIFT_FORMAT="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift-format"
          "$SWIFT_FORMAT" --version
          "$SWIFT_FORMAT" lint --configuration app/.swift-format --recursive .

  localization_check:
    name: localization-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check localizations
        run: python3 scripts/check_localizations.py

  build_and_test:
    name: build-and-test
    runs-on: macos-latest
    needs: [swift_format, localization_check]
    steps:
      - uses: actions/checkout@v4

      - name: Environment info
        run: |
          sw_vers
          xcodebuild -version
          xcode-select -p
          xcrun simctl list runtimes
          xcrun simctl list devices available

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: DerivedData
          key: xcode-deriveddata-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            xcode-deriveddata-${{ runner.os }}-

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build for testing (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project app/dauphin.xcodeproj \
            -scheme "dauphin" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath build-result \
            -showBuildTimingSummary \
            build-for-testing 2>&1 | tee build.log

      - name: Run unit tests (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project app/dauphin.xcodeproj \
            -scheme "dauphin" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            -testPlan Models \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath test-result \
            test-without-building 2>&1 | tee test.log

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build-result.xcresult/
            test-result.xcresult/
            build.log
            test.log
          retention-days: 7
