name: Format

# 觸發條件
on:
  pull_request:       # 所有 PR 都觸發
  push:
    branches:
      - dev           # 只有 push 到 dev 時觸發
  workflow_dispatch:  # 手動觸發

# 自動取消舊的 workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift_format:
    name: swift-format
    runs-on: macOS-14
    steps:
      - uses: actions/checkout@v4

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install swift-format
        run: brew install swift-format

      - name: Format
        run: make format

      - name: Auto-commit formatted code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[ci skip] Run swift-format"
          branch: "main"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: build
    runs-on: macOS-14
    needs: swift_format
    steps:
      - uses: actions/checkout@v4

      - name: Xcode Select
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build (iOS 17.2 Simulator)
        run: xcodebuild -project dauphin.xcodeproj -scheme "dauphin" -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' clean build
